version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: whatsapp_affiliate_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: whatsapp_affiliate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: whatsapp_affiliate_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsapp_affiliate_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/whatsapp_affiliate?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkey123!
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app-network

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: whatsapp_affiliate_worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/whatsapp_affiliate?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./worker:/app
      - /app/node_modules
      - whatsapp_sessions:/app/sessions
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatsapp_affiliate_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  whatsapp_sessions:

networks:
  app-network:
    driver: bridge
