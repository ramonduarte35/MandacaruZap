version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: whatsapp_affiliate_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: whatsapp_affiliate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: whatsapp_affiliate_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsapp_affiliate_backend
    restart: always
    ports:
      - "5050:5050"
    environment:
      - PORT=5050
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/whatsapp_affiliate?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - WORKER_SECRET=${WORKER_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app-network

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: whatsapp_affiliate_worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/whatsapp_affiliate?schema=public
      - REDIS_URL=redis://redis:6379
      - WORKER_SECRET=${WORKER_SECRET}
      - WORKER_PORT=5001
    depends_on:
      - db
      - redis
    volumes:
      - ./worker:/app
      - /app/node_modules
      - whatsapp_sessions:/app/sessions
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatsapp_affiliate_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  whatsapp_sessions:

networks:
  app-network:
    driver: bridge
